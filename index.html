      id:"porsche356polar",make:"Porsche",model:"356A – Valkyrie Racing / Project 356 Polar",years:"1956",

      featuredReason:"",
      review:"El 1956 Porsche 356A de Valkyrie Racing en el Petersen Automotive Museum, exhibido en la exposición We Are Porsche. Orugas traseras de nieve, esquíes delanteros, barra antifisura (crevasse bar), paneles solares duales, número #38 y gráficos Race to Rescue / PXG. Renée Brinkerhoff, madre de cuatro hijos de Colorado, recorrió ~20,000 millas en los 7 continentes con este auto para recaudar fondos contra el tráfico infantil. La modificación de 18 meses a cargo del ingeniero Kieron Bradley reemplazó las ruedas traseras por orugas y añadió esquíes delanteros que hacen menos impacto sobre la nieve que una huella humana. El sistema aumentó la flotación hasta 300% respecto a los vehículos 4x4 de apoyo antártico.",
      hp:60,topSpeed:"40 km/h (en nieve con orugas)",zero:"N/A",priceCAD:"$450,000–$700,000 CAD (estimado — 356 histórico + modificación de expedición documentada, ref. subastas Porsche vintage modificados)",badge:"",badgeLabel:"",imgKey:"porsche356polar",
      specs:{"Motor":"Flat-4 1.6L atmosférico (356A original)","Potencia":"~60 hp","Propulsión antartica":"Orugas traseras + esquíes delanteros","Vel. recomendada":"40 km/h (con orugas)","Presión suelo":"1.2 psi máximo (menor que una huella humana)","Modificaciones":"18 meses de re-ingeniería por Kieron Bradley (UK)","Paneles solares":"Duales — para iluminación y navegación","Barra antifisura":"Crevasse bar — para cruzar grietas de hielo","Patrocinador":"PXG (marca de golf, Scottsdale AZ)","Campaña":"Valkyrie Racing / Race to Rescue — contra el tráfico infantil","Km recorridos":"~32,000 km en los 7 continentes","Ubicación":"Petersen Automotive Museum — exposición We Are Porsche"},

      id:"benzPatentMotor",make:"Benz",model:"Patent-Motorwagen – Réplica (1886)",years:"1886",
      photoDate:"15 de septiembre, 2023",photoTimestamp:20230915,featured:false,
      featuredReason:"",
      review:"El 1886 Benz Patent-Motorwagen en el Petersen Automotive Museum — réplica por John Bentley, colección del Petersen, regalo de Margie y Robert E. Petersen. El cartel confirma: Top Speed 10 mph, Horsepower 0.75, Number Built 25 (réplicas), Price when new N/A. Karl Benz construyó el Patent-Motorwagen en Mannheim en 1885–1886 y lo patentó el 29 de enero de 1886 — la fecha oficial del nacimiento del automóvil. Motor monocilíndrico de cuatro tiempos de 954cc con 0.75hp, tres ruedas, encendido eléctrico y enfriamiento por agua. En agosto de 1888, Bertha Benz (esposa de Karl) tomó el auto sin permiso y realizó el primer viaje de larga distancia en automóvil de la historia: 106 km de Mannheim a Pforzheim con sus dos hijos adolescentes.",
      hp:1,topSpeed:"16 km/h",zero:"N/A",priceCAD:"$110,000–$200,000 CAD (estimado — réplicas certificadas de John Bentley en subastas RM Sotheby's/Bonhams; el original de 1886 en el Deutsches Museum no tiene precio de mercado)",badge:"",badgeLabel:"",imgKey:"benzPatentMotor",
      specs:{"Motor":"Monocilíndrico 954cc 4 tiempos — diseño original Karl Benz","Potencia":"0.75 hp / ~1 Nm","Combustible":"Ligroína (nafta ligera)","Encendido":"Eléctrico (bobina)","Enfriamiento":"Agua","Transmisión":"2 velocidades por cadena","Tracción":"RWD (rueda trasera central)","Vel. máxima":"~16 km/h (10 mph)","Ruedas":"3 (1 delantera directriz, 2 traseras motrices)","Año original":"1886 (patentado 29 enero 1886)","Réplica por":"John Bentley","Colección":"Petersen Automotive Museum — regalo de Margie y Robert E. Petersen","Ubicación":"Petersen Automotive Museum, Los Ángeles, CA"},
      highlights:["El 29 de enero de 1886 Karl Benz patentó el Patent-Motorwagen — esa fecha es el cumpleaños oficial del automóvil, el vehículo más transformador en la historia de la humanidad","En agosto de 1888 Bertha Benz realizó el primer viaje de larga distancia en auto de la historia: 106 km de Mannheim a Pforzheim con sus dos hijos — sin permiso de Karl y sin mapa","0.75 horsepower — literalmente menos de un caballo de fuerza, pero suficiente para iniciar la industria que hoy produce 85 millones de autos al año y transformó la civilización","El cartel confirma Number Built: 25 (réplicas) — el original está en el Deutsches Museum de Munich; esta réplica de John Bentley es una de las más precisas del mundo","El auto más antiguo del dashboard por 39 años sobre el LaSalle 1930 y por 23 sobre el Cadillac 1941 — y también el más lento: 16 km/h máximo contra 315 del McLaren 675LT"]

      featuredReason:"",
      review:"El Alfa Romeo Disco Volante (platillo volador) de 1952–1953 en el Petersen Automotive Museum — carrocería teal/azul-verde metalizada de Carrozzeria Touring Superleggera, silueta teardrop sin una sola línea recta, ruedas de radios semiocultas bajo guardafangos envolventes. El Disco Volante fue uno de los experimentos aerodinámicos más radicales de la posguerra: Alfa Romeo encargó a Touring el diseño de una carrocería completamente nueva sobre el chasis del 6C 3000 CM para competir en Le Mans y la Mille Miglia. La silueta inspiró décadas de diseño italiano — las curvas del Disco Volante se pueden trazar en el ADN del Ferrari 458, el Alfa 8C y el TZ3.",

      id:"arshamPorsche911",make:"Daniel Arsham",model:"Eroded Porsche 911 – Escultura de Cuarzo y Selenita",years:"2022",
      photoDate:"15 de septiembre, 2023",photoTimestamp:20230915,featured:false,
      featuredReason:"",
      review:"La escultura Eroded Porsche 911 del artista Daniel Arsham en el Petersen Automotive Museum, parte de la exposición Arsham Auto Motive (febrero–noviembre 2023). No es un automóvil real: es un molde completo de un Porsche 911 fundido en yeso blanco, con erupciones de cristales de cuarzo y selenita emergiendo de la carrocería, el capó y los asientos como si el auto hubiera sido descubierto fosilizado tras siglos enterrado. Daniel Arsham, cofundador de Snarkitecture, trabaja con la idea de una arqueología ficticia: objetos del presente cultural imaginados como artefactos del futuro distante. La exposición incluyó también un Ford Mustang GT Fastback 1968 erosionado, un Porsche 356 Speedster 1955 y un Ferrari 2018, todos con el mismo tratamiento. Al fondo en la foto: otra escultura blanca con cristales, probablemente el roadster de la misma serie.",
      hp:0,topSpeed:"N/A",zero:"N/A",priceCAD:"$220,000–$550,000 CAD (estimado — esculturas erosionadas de Daniel Arsham comparables en subastas de arte contemporáneo Phillips/Sotheby's)",badge:"",badgeLabel:"",imgKey:"arshamPorsche911",
      specs:{"Artista":"Daniel Arsham (Cleveland, 1980 — cofundador de Snarkitecture)","Material":"Yeso blanco fundido + cristales de cuarzo y selenita","Técnica":"Molde de un Porsche 911 real, erosionado artísticamente","Concepto":"Arqueología ficticia — objetos del presente imaginados como artefactos futuros","Exposición":"Arsham Auto Motive — Petersen Automotive Museum","Fechas exposición":"25 de febrero – 26 de noviembre de 2023","Otras piezas de la serie":"Ford Mustang GT 1968, Porsche 356 Speedster 1955, Ferrari 2018","Ubicación":"Petersen Automotive Museum, Los Ángeles, CA"},
      highlights:["No es un automóvil — es una escultura de yeso blanco con erupciones de cuarzo y selenita, fundida directamente de un Porsche 911 real, que reinterpreta el auto como artefacto arqueológico del futuro","Daniel Arsham crea una arqueología ficticia: objetos cotidianos de nuestro presente (autos, cámaras, teléfonos) imaginados como hallazgos fosilizados de civilizaciones por venir","Arsham Auto Motive (feb–nov 2023) incluyó también un Ford Mustang GT 1968, un Porsche 356 Speedster 1955 y un Ferrari 2018 erosionados — el dashboard solo capturó el 911","Primera pieza de arte puro del dashboard que no es ni siquiera técnicamente un vehículo — los cristales emergiendo del capó y los asientos son la antítesis total de las especificaciones de potencia y velocidad","El contraste definitivo del Petersen: desde el Benz Patent-Motorwagen de 0.75hp (el primer auto real) hasta esta escultura de 0hp (la idea de un auto, fosilizada)"]

      photoDate:"15 de septiembre, 2023",photoTimestamp:20230915,featured:false,

      review:"El 1950 Mercury Monterey en el Petersen Automotive Museum — el lead sled conducido por Sylvester Stallone en Cobra (1986), donde interpreta al detective Marion Cobra Cobretti. Gris metalizado con hood scoop, parrilla horizontal cromada y placa vanity de California AWSOM 50. El Mercury de 1950 fue apodado lead sled por los hot rodders de los años 50, que rellenaban las uniones de la carrocería con plomo para lograr líneas perfectamente lisas tras eliminar el cromo y chopear el techo. Cuatro ejemplares fueron construidos y modificados para la película; este conservó el look rugged que el personaje de Stallone necesitaba para sus escenas de persecución.",

      review:"El Nash-Healey roadster en el Petersen Automotive Museum — plateado con interior rojo, carrocería diseñada por Battista Pinin Farina sobre chasis Nash-Healey. El cartel del museo lo confirma: An International Affair, World s Foremost Car Designer. En 1951 Nash Motor Company se asoció con el ingeniero británico Donald Healey para producir el Nash-Healey, combinando el chasis del Healey Silverstone de carreras con el confiable motor de seis cilindros de Nash. Pinin Farina rediseñó la carrocería combinando elementos reconocibles de los Nash de tamaño completo con la silueta tensa y elegante de la escuela italiana. El resultado fue el primer auto deportivo americano de posguerra construido con colaboración internacional explícita: chasis americano, motor americano, ingeniería británica, diseño italiano.",

      review:"El 1948 Porsche 356/1 en el Petersen Automotive Museum — el auto que abre la exposición We Are Porsche, chief entre los primeros esfuerzos de la marca. Carrocería de aluminio pulido sin pintar, interior rojo, techo con panel de rejilla de ventilación. Este es el 35hp abuelo al que todos los Porsche pueden trazar su linaje, donado por Porsche mismo en su condición pristina. Construido en Gmünd, Austria, inmediatamente después de la Segunda Guerra Mundial, cuando Porsche fabricaba carrocerías 356 SL usando moldes de madera para dar forma a paneles de aluminio a mano. El 356/1 fue el primer auto que llevó el nombre Porsche — antes de esto, Ferdinand Porsche solo había diseñado autos para otras marcas, incluyendo el VW Beetle.",

      specs:{"Motor":"Flat-4 1.1L enfriado por aire (basado en el motor VW)","Potencia":"35 hp","Carrocería":"Aluminio sin pintar — construido a mano en Gmünd, Austria","Color":"Aluminio pulido / interior rojo","Chasis":"Tubular ligero, motor central-trasero","Producción":"Chasis No. 1 — el primer Porsche jamás fabricado","Ubicación de construcción":"Gmünd, Austria (fábrica temporal de posguerra)","Año":"1948","Exposición":"We Are Porsche — Petersen Automotive Museum","Propietario":"Porsche AG (donado para la exposición)","Ubicación":"Petersen Automotive Museum, Los Ángeles, CA"},
      highlights:["El primer auto que llevó el nombre Porsche — antes de 1948, Ferdinand Porsche solo había diseñado autos para otras marcas, incluyendo el Volkswagen Beetle","Carrocería de aluminio construida a mano en Gmünd, Austria, usando moldes de madera para dar forma a los paneles — el mismo proceso artesanal que definió los primeros años de la marca","Donado por Porsche AG mismo para la exposición We Are Porsche (2023) en su condición pristina de fábrica — no es una réplica, es el chasis No. 1 original","Solo 35hp de un motor flat-4 basado en componentes de Volkswagen — de este origen minúsculo nació la marca que hoy fabrica el 911 GT3 RS y el Taycan Turbo GT","El primer Porsche del dashboard cronológicamente — antecede al 356A Polar, al 356 Fernandez Darrin, al 917/30, al 935, al 944, al 992 y a todos los demás Porsche de la colección"]

      featuredReason:"",
      review:"El Mercer Raceabout en el Petersen Automotive Museum — amarillo brillante con detalles en latón/bronce pulido, ruedas de radios amarillo, sin puertas ni parabrisas convencional, solo un pequeño deflector de viento circular con manivela frente al conductor. El Mercer Raceabout (1910–1915) es considerado uno de los primeros muscle cars americanos y uno de los autos deportivos más influyentes de la era Brass — construido por la Mercer Automobile Company de Trenton, Nueva Jersey, con un motor T-head de 4 cilindros y una filosofía de diseño obsesionada con el peso mínimo: sin carrocería innecesaria, sin parabrisas de cristal completo, solo lo esencial para ir rápido. El Raceabout dominó las carreras de resistencia americanas de principios de siglo.",

      highlights:["Considerado uno de los primeros muscle cars americanos — el Raceabout priorizaba la velocidad sobre la comodidad décadas antes de que ese concepto tuviera nombre","Sin parabrisas convencional — solo un pequeño deflector circular con manivela frente al conductor, la expresión más pura de la filosofía de peso mínimo de Mercer","El motor T-head de 4.9L con válvulas en lados opuestos del cilindro era una arquitectura avanzada para 1910 — permitía mejor flujo de aire que los diseños L-head contemporáneos","El Raceabout dominó las carreras de resistencia americanas de la era Brass (1905-1915) — su ligereza y potencia lo hacían prácticamente imbatible en su categoría","Uno de los autos más antiguos y valiosos del Petersen — junto al Benz Patent-Motorwagen (réplica de 1886) y el LaSalle (1930), documenta la era pionera del automóvil americano"]

function topStats(cars){
  const _PROTO=new Set(['teslaSemiAlpha','teslaRoadster2','batmobile1989','porscheDesignP0001','acPropulsionTzero','morrisTulipas','listerRacer']);
  cars=cars.filter(c=>!_PROTO.has(c.id));
  if(!cars||cars.length<2) return '';
  function best(arr,fn,fmt,icon,label){
    const w=arr.reduce((a,b)=>fn(a)>=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }
  function parseSpeed(s){return parseFloat(s)||0;}
  function parseZero(s){return parseFloat(s)||999;}
  function parseYear(c){return c.modelYear||parseInt((c.years||'').split('–')[0])||9999;}
  function parsePrice(s){
    const matches=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>parseInt(m[1].replace(/,/g,'')));
    return matches.length?Math.max(...matches):0;
  }
  const fastest = best(cars,c=>parseSpeed(c.topSpeed),c=>c.topSpeed,'🏎️','Mayor velocidad');
  const power   = best(cars,c=>c.hp||0,c=>`${c.hp} hp`,'⚡','Mayor potencia');
  const accel   = best(cars,c=>-parseZero(c.zero),c=>c.zero,'🚀','Mejor aceleración');
  const oldest  = best(cars,c=>-parseYear(c),c=>parseYear(c),'📅','Más antiguo');
  function maxPriceDisplay(s){
    const matches=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>m[1]);
    return matches.length?'$'+matches[matches.length-1]:'';
  }
  const pricey  = best(cars,c=>parsePrice(c.priceCAD),c=>maxPriceDisplay(c.priceCAD),'💰','Más costoso');
  return `<div class="stats-bar">${fastest}${power}${accel}${oldest}${pricey}</div>`;
}

function findCarById(id){
  for(const m of Object.values(CARS)){
    const c=m.cars.find(c=>c.id===id);
    if(c) return c;
  }
  for(const ev of Object.values(EVENTS)){
    const c=ev.cars.find(c=>c.id===id);
    if(c) return c;
  }
  return null;
}

function renderGeneration(key){
  active=key;

    const m=(c.years||'').match(/(\d{4})/);

  const sorted=[...cars].sort((a,b)=>startYear(a)-startYear(b));

function renderTabs(){

  const monthEntries=Object.entries(CARS).filter(([k])=>k.match(/^\d{4}-\d{2}$/));

    const yr=k.split('-')[0];
    if(!byYear[yr]) byYear[yr]=[];
    byYear[yr].push({key:k,label:v.label,count:v.cars.length});
  });
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  const events=Object.entries(EVENTS).map(([k,v])=>({key:k,label:v.label,count:v.cars.length,ts:v.timestamp||0})).sort((a,b)=>b.ts-a.ts);

  years.forEach(yr=>{
    const months=byYear[yr].sort((a,b)=>b.key.localeCompare(a.key));
    const yrActive=months.some(m=>m.key===active);
    html+=`<div class="hw-tab${yrActive?' active':''} hw-tab-drop" data-m="__yr${yr}" onclick="toggleDrop(this,'yr${yr}')">${yr} <span class="drop-arrow">▾</span></div>`;

  const genEntries=Object.entries(GENERATIONS).map(([k,v])=>({key:k,label:v.label,count:v.carIds.length}));
  const genActive=genEntries.some(g=>g.key===active)||active==='__generaciones';
  const genCount=genEntries.reduce((s,g)=>s+g.count,0);
  html+=`<div class="hw-tab hw-tab-fun${genActive?' active':''} hw-tab-drop" data-m="__generaciones" onclick="toggleDrop(this,'generaciones')">🧬 Generaciones <span class="drop-arrow">▾</span></div>`;

function buildDropItems(id, events, byYear){
  const eventsData=Object.entries(EVENTS).map(([k,v])=>({key:k,label:v.label,count:v.cars.length,ts:v.timestamp||0})).sort((a,b)=>b.ts-a.ts);
  if(id==='eventos'){
    return eventsData.map(e=>`<div class="drop-item${e.key===active?' drop-active':''}" onclick="setActive('${e.key}','event');closeDrop()">${e.label}<span class="drop-pill">${e.count}</span></div>`).join('');
  }
  if(id==='generaciones'){
    const genEntries=Object.entries(GENERATIONS).map(([k,v])=>({key:k,label:v.label,count:v.carIds.length}));
    return genEntries.map(g=>`<div class="drop-item${g.key===active?' drop-active':''}" onclick="setActive('${g.key}','generation');closeDrop()">${g.label}<span class="drop-pill">${g.count}</span></div>`).join('');
  }
  const yr=id.replace('yr','');
  const monthEntries=Object.entries(CARS).filter(([k])=>k.startsWith(yr+'-'));
  const months=monthEntries.map(([k,v])=>({key:k,label:v.label,count:v.cars.length})).sort((a,b)=>b.key.localeCompare(a.key));
  return months.map(m=>`<div class="drop-item${m.key===active?' drop-active':''}" onclick="setActive('${m.key}','month');closeDrop()">${m.label}<span class="drop-pill">${m.count}</span></div>`).join('');
}

function toggleDrop(el, id){
  const ov=document.getElementById('drop-overlay');
  if(window._openDrop===id){ closeDrop(); return; }
  window._openDrop=id;
  const rect=el.getBoundingClientRect();
  const items=buildDropItems(id);
  ov.innerHTML=`<div class="drop-menu open">${items}</div>`;
  ov.style.display='block';
  ov.style.left=Math.min(rect.left, window.innerWidth-220)+'px';
  const spaceBelow=window.innerHeight-rect.bottom-8;
  const maxMenuH=Math.min(420, window.innerHeight*0.6);
  if(spaceBelow<220 && rect.top>spaceBelow){
    ov.style.top='auto';
    ov.style.bottom=(window.innerHeight-rect.top+4)+'px';
  } else {
    ov.style.bottom='auto';
    ov.style.top=(rect.bottom+4)+'px';
  }
  ov.style.minWidth='200px';
}

function closeDrop(){
  window._openDrop=null;
  const ov=document.getElementById('drop-overlay');
  if(ov){ ov.style.display='none'; ov.innerHTML=''; }
}

const navHistory=[];
function setActive(key, type, pushHistory=true){
  if(pushHistory && active) navHistory.push({key:active, type:window._activeType||'month'});
  window._activeType=type;
  active = key;
  if(type==='event') renderEvent(key);
  else if(type==='collection') renderCollection(key);
  else if(type==='generation') renderGeneration(key);
  else if(type==='brands') renderBrands();
  else if(type==='brand-detail') renderBrandDetail(key);
  else renderMonth(key);
  updateBackBtn();
}

function goBack(){
  if(!navHistory.length) return;
  const prev=navHistory.pop();
  setActive(prev.key, prev.type, false);
}

function updateBackBtn(){
  const btn=document.getElementById('back-btn');
  if(!btn) return;
  btn.style.display=navHistory.length?'flex':'none';
}

function getAllCars(){
  const all=[];
  Object.entries(CARS).forEach(([,sec])=>sec.cars.forEach(c=>all.push(c)));
  Object.entries(EVENTS).forEach(([,ev])=>ev.cars.forEach(c=>all.push(c)));
  return all;
}

function renderBrands(){
  active='marcas';
  const all=getAllCars();
  const byMake={};
  all.forEach(c=>{
    if(!byMake[c.make]) byMake[c.make]=[];
    byMake[c.make].push(c);
  });
  const sorted=Object.keys(byMake).sort((a,b)=>a.localeCompare(b));
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div class="month-title">Marcas</div>
      <div class="month-recap">Todas las marcas del dashboard — haz clic en una para ver sus autos.</div>
    </div>
    <div class="brands-grid">
      ${sorted.map(make=>{
        const cars=byMake[make];
        const logoKey=BRAND_LOGOS[make];
        const logoSrc=logoKey&&IMGS[logoKey];
        const logoHtml=logoSrc
          ?`<img src="${logoSrc}" alt="${make}" class="brand-card-logo" />`
          :`<div class="brand-card-initials">${make.substring(0,2).toUpperCase()}</div>`;
        return `<div class="brand-card" onclick="setActive('brand::${make}','brand-detail')">
          <div class="brand-card-img">${logoHtml}</div>
          <div class="brand-card-name">${make}</div>
          <div class="brand-card-count">${cars.length} auto${cars.length!==1?'s':''}</div>
        </div>`;
      }).join('')}
    </div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m==='marcas'));
}

function renderBrandDetail(makeKey){
  const make=makeKey.replace('brand::','');
  const all=getAllCars().filter(c=>c.make===make);
  const sorted=[...all].sort((a,b)=>(b.photoTimestamp||0)-(a.photoTimestamp||0));
  const logoKey=BRAND_LOGOS[make];
  const logoSrc=logoKey&&IMGS[logoKey];
  const logoHtml=logoSrc?`<img src="${logoSrc}" alt="${make}" style="height:48px;object-fit:contain;" />`:`<strong>${make}</strong>`;
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        ${logoHtml}
        <div>
          <div class="month-title">${make}</div>
          <div class="month-recap">${sorted.length} auto${sorted.length!==1?'s':''} en el dashboard · <span style="cursor:pointer;color:#c8a200;text-decoration:underline;" onclick="renderBrands()">← Todas las marcas</span></div>
        </div>
      </div>
    </div>
    ${sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(sorted):''}
    <div class="section-title">Autos</div>
    <div class="cars-grid">${sorted.map(carCard).join('')}</div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m==='marcas'));
}

function renderEvent(key){
  active=key;
  const ev=EVENTS[key];
  const sorted=[...ev.cars].sort((a,b)=>{
    const dt=(b.photoTimestamp||0)-(a.photoTimestamp||0);
    if(dt!==0) return dt;
    return (b.featured?1:0)-(a.featured?1:0);
  });
  const feat=sorted[0];
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div class="event-trophy">⭐ Evento Especial</div>
      <div class="month-title">${ev.label}</div>
      <div class="event-meta" style="margin-top:.3rem;">
        <span class="event-meta-item">📅 ${ev.date}</span>
        <span class="event-meta-item">📍 ${ev.location}</span>
        <span class="event-meta-item">🚗 ${ev.cars.length} hallazgo${ev.cars.length!==1?'s':''}</span>
      </div>
      <div class="event-desc">${ev.description}</div>
    </div>`+
    (feat?`<div class="section-title">Destacado</div>`+featHero(feat):'')+
    (sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(ev.cars):'')+
    (sorted.length?`<div class="section-title">Hallazgos</div><div class="cars-grid">${sorted.map(carCard).join('')}</div>`:
    `<div class="empty-msg"><i class="ti ti-car" aria-hidden="true"></i><p>Sin hallazgos en este evento</p></div>`)+
    `<div class="add-box"><div class="add-lbl">Agregar auto de este evento</div>
    <button class="add-btn" onclick="sendPrompt('Quiero agregar un auto al evento ${ev.label}. Aquí va la foto:')"><i class="ti ti-plus" aria-hidden="true"></i> AGREGAR AUTO</button>
    <div class="add-note">Sube la foto directamente al chat y Claude detecta el modelo</div></div>`;

function renderGlobalTopStats(){
  // Collect all cars from all sections, excluding prototypes
  const allCars = [];
  const PROTO_IDS = new Set(['teslaSemiAlpha','teslaRoadster2','batmobile1989','porscheDesignP0001','acPropulsionTzero','morrisTulipas','listerRacer','benzPatentMotor','arshamPorsche911','porsche550ClydeKwok']);
  Object.values(CARS).forEach(m=>m.cars.forEach(c=>{ if(!PROTO_IDS.has(c.id)) allCars.push(c); }));
  Object.values(EVENTS).forEach(e=>e.cars.forEach(c=>{ if(!PROTO_IDS.has(c.id)) allCars.push(c); }));

  function parseSpeed(s){return parseFloat((s||'').replace(',','.'))||0;}
  function parseZero(s){const v=parseFloat(s);return(!s||s==='N/A'||isNaN(v))?999:v;}
  function parseYear(c){return parseInt((c.years||'').split(/[–-]/)[0])||9999;}
  function parsePrice(s){
    const m=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>parseInt(m[1].replace(/,/g,'')));
    return m.length?Math.max(...m):0;
  }
  function maxPriceLabel(s){
    const m=[...(s||'').matchAll(/\$([\d,]+)/g)];
    return m.length?'$'+m[m.length-1][1]:'N/A';
  }

  function best(fn,fmt,icon,label){
    const valid=allCars.filter(c=>fn(c)>0);
    if(!valid.length) return '';
    const w=valid.reduce((a,b)=>fn(a)>=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }
  function bestMin(fn,fmt,icon,label){
    const valid=allCars.filter(c=>fn(c)<9999);
    if(!valid.length) return '';
    const w=valid.reduce((a,b)=>fn(a)<=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }

  const power   = best(c=>c.hp||0, c=>`${c.hp} hp`, '⚡', 'Mayor potencia');
  const fastest = best(c=>parseSpeed(c.topSpeed), c=>c.topSpeed, '🏎️', 'Mayor velocidad');
  const accel   = bestMin(c=>parseZero(c.zero), c=>c.zero, '🚀', 'Mejor aceleración');
  const oldest  = bestMin(c=>parseYear(c), c=>String(parseYear(c)), '📅', 'Más antiguo');
  const pricey  = best(c=>parsePrice(c.priceCAD), c=>maxPriceLabel(c.priceCAD), '💰', 'Más costoso');

  const total = allCars.length;

  document.getElementById('global-top-stats').innerHTML = `
    <div style="padding:.6rem 1rem .2rem;background:#fff;border-bottom:1px solid #eee;">
      <div style="font-size:.65rem;font-weight:800;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;">🏆 Récords de la Colección · ${total} vehículos</div>
      <div class="stats-bar" style="margin:0;">${power}${fastest}${accel}${oldest}${pricey}</div>
    </div>`;
}

function init(){
  renderTabs();
  renderMonth(active);
  renderCollectors();
  renderGlobalTopStats();
  enableTabsScroll();
}

function enableTabsScroll(){
  const tabs=document.getElementById('tabs');
  if(!tabs) return;
  tabs.addEventListener('wheel',e=>{
    if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
      tabs.scrollLeft+=e.deltaY;
      e.preventDefault();
    }
  },{passive:false});
  let isDown=false,startX=0,startScroll=0,moved=false;
  tabs.addEventListener('mousedown',e=>{
    isDown=true;moved=false;tabs.classList.add('dragging');
    startX=e.pageX;startScroll=tabs.scrollLeft;
  });
  window.addEventListener('mouseup',()=>{isDown=false;tabs.classList.remove('dragging');});
  tabs.addEventListener('mouseleave',()=>{isDown=false;tabs.classList.remove('dragging');});
  tabs.addEventListener('mousemove',e=>{
    if(!isDown) return;
    e.preventDefault();
    const dx=e.pageX-startX;
    if(Math.abs(dx)>3) moved=true;
    tabs.scrollLeft=startScroll-dx;
  });
  tabs.addEventListener('click',e=>{ if(moved){ e.preventDefault(); e.stopPropagation(); } },{capture:true});
}
