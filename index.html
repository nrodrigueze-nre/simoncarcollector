.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;}

.lightbox img{max-width:92vw;max-height:82vh;object-fit:contain;border-radius:6px;display:block;}
.lightbox-caption{color:#fff;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;}
.lightbox-date{color:#FFD700;font-size:0.78rem;letter-spacing:2px;font-weight:700;}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:2.2rem;cursor:pointer;line-height:1;}
.lightbox-close:hover{opacity:.7;}

function openLB(imgKey,cap,date){
  const src=IMGS[imgKey]||'';
  if(!src) return;
  document.getElementById('lbImg').src=src;
  document.getElementById('lbCap').textContent=cap;
  document.getElementById('lbDate').textContent=date?'Fotografiado el '+date:'';
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

function badgeHtml(c){
  if(!c.badge) return '';
  const cls=c.badge==='stance'?'badge-stance':'badge-chrome';
  return `<span class="mod-badge ${cls}">${c.badgeLabel}</span>`;
}

  'Mazda':'logo_mazda'
};

function brandLogoHtml(make){
  const key=BRAND_LOGOS[make];
  const src=key&&IMGS[key];
  if(!src) return '';
  return `<img src="${src}" alt="${make} logo" class="brand-logo" />`;
}

function carCard(c){
  const src=IMGS[c.imgKey]||'';
  const imgHtml=src
    ?`<img src="${src}" alt="${c.make} ${c.model}" style="opacity:1;" />`
    :`<div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><i class="ti ti-car" style="font-size:2.8rem;color:#bbb;"></i><span style="font-size:0.8rem;letter-spacing:2px;color:#555;text-transform:uppercase;font-weight:700;">${c.make} ${c.model}</span></div>`;
  const specs=Object.entries(c.specs).map(([k,v])=>`<div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`).join('');
  const hls=c.highlights.map(h=>`<li>${h}</li>`).join('');
  return `<div class="car-card${c.featured?' featured':''}" id="card-${c.id}">
    <div class="car-img-wrap" onclick="openLB('${c.imgKey}','${c.make} ${c.model} · ${c.years}','${c.photoDate||''}')" title="Clic para ver foto completa">
      ${imgHtml}
      ${c.photoDate?`<span class="photo-date"><i class="ti ti-calendar" aria-hidden="true"></i> ${c.photoDate}</span>`:''}
      ${src?`<span class="zoom-hint"><i class="ti ti-zoom-in" aria-hidden="true"></i> Ver foto</span>`:''}
    </div>
    <div class="car-stripe"></div>
    <div class="car-info">
      <div class="car-make-row">${brandLogoHtml(c.make)}<div class="car-make-model"><span class="car-make">${c.make}${badgeHtml(c)}</span><div class="car-model">${c.model}</div></div></div>
      <div class="car-year">${c.years}</div>
      <div class="qs-grid">
        <div class="qs"><div class="qs-val">${c.hp}</div><div class="qs-lbl">HP</div></div>
        <div class="qs"><div class="qs-val">${c.topSpeed}</div><div class="qs-lbl">V-Max</div></div>
        <div class="qs"><div class="qs-val">${c.zero}</div><div class="qs-lbl">0–100</div></div>
      </div>
      <div class="price-wrap"><span class="price-tag">Precio CA:</span><span class="price-val">${c.priceCAD}</span></div>
    </div>
    <button class="expand-btn" id="btn-${c.id}" onclick="toggle('${c.id}')">
      <i class="ti ti-chevron-down" aria-hidden="true"></i> Ver especificaciones
    </button>
    <div class="car-details" id="det-${c.id}">
      <div class="dtl-sec"><div class="dtl-title">Especificaciones técnicas</div>${specs}</div>
      <div class="dtl-sec"><div class="dtl-title">Datos destacados</div><ul class="hl-list">${hls}</ul></div>
      ${c.featured?`<div class="dtl-sec"><div class="dtl-title">¿Por qué es el destacado?</div><div class="feat-reason">${c.featuredReason}</div></div>`:''}
    </div>
  </div>`;
}

function toggle(id){
  const d=document.getElementById('det-'+id),b=document.getElementById('btn-'+id),o=d.classList.contains('open');
  d.classList.toggle('open',!o);b.classList.toggle('open',!o);
  b.innerHTML=o?'<i class="ti ti-chevron-down" aria-hidden="true"></i> Ver especificaciones':'<i class="ti ti-chevron-up" aria-hidden="true"></i> Cerrar especificaciones';
}

function featHero(c){
  const src=IMGS[c.imgKey]||'';
  const imgHtml=src
    ?`<img src="${src}" alt="${c.make} ${c.model}" />`
    :`<div style="display:flex;align-items:center;justify-content:center;height:100%;"><i class="ti ti-car" style="font-size:3rem;color:#555;"></i></div>`;
  return `<div class="feat-hero">
    <div class="feat-hero-img" onclick="openLB('${c.imgKey}','${c.make} ${c.model} · ${c.years}','${c.photoDate||''}')" title="Clic para ver foto completa">
      ${imgHtml}
      ${c.photoDate?`<span class="photo-date"><i class="ti ti-calendar" aria-hidden="true"></i> ${c.photoDate}</span>`:''}
      ${src?`<span class="zoom-hint"><i class="ti ti-zoom-in" aria-hidden="true"></i> Ver foto</span>`:''}
    </div>
    <div class="feat-hero-info">
      <div class="feat-hero-label">⭐ Destacado del mes</div>
      <div class="feat-hero-make">${c.make}</div>
      <div class="feat-hero-model">${c.model}</div>
      <div class="feat-hero-years">${c.years}</div>
      <div class="feat-hero-stats">
        <div class="feat-hero-stat"><div class="feat-hero-stat-val">${c.hp}</div><div class="feat-hero-stat-lbl">HP</div></div>
        <div class="feat-hero-stat"><div class="feat-hero-stat-val">${c.topSpeed}</div><div class="feat-hero-stat-lbl">V-Max</div></div>
        <div class="feat-hero-stat"><div class="feat-hero-stat-val">${c.zero}</div><div class="feat-hero-stat-lbl">0–100</div></div>
      </div>
      <div class="feat-hero-review">${c.review||c.featuredReason}</div>
      <div class="feat-hero-price">Precio CA: <span>${c.priceCAD}</span></div>
    </div>
  </div>`;
}

function topStats(cars){
  if(!cars||cars.length<2) return '';
  function best(arr,fn,fmt,icon,label){
    const w=arr.reduce((a,b)=>fn(a)>=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }
  function parseSpeed(s){return parseFloat(s)||0;}
  function parseZero(s){return parseFloat(s)||999;}
  function parseYear(s){return parseInt((s||'').split('–')[0])||9999;}
  function parsePrice(s){
    const matches=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>parseInt(m[1].replace(/,/g,'')));
    return matches.length?Math.max(...matches):0;
  }
  const fastest = best(cars,c=>parseSpeed(c.topSpeed),c=>c.topSpeed,'🏎️','Mayor velocidad');
  const power   = best(cars,c=>c.hp||0,c=>`${c.hp} hp`,'⚡','Mayor potencia');
  const accel   = best(cars,c=>-parseZero(c.zero),c=>c.zero,'🚀','Mejor aceleración');
  const oldest  = best(cars,c=>-parseYear(c.years),c=>c.years.split('–')[0],'📅','Más antiguo');
  function maxPriceDisplay(s){
    const matches=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>m[1]);
    return matches.length?'$'+matches[matches.length-1]:'';
  }
  const pricey  = best(cars,c=>parsePrice(c.priceCAD),c=>maxPriceDisplay(c.priceCAD),'💰','Más costoso');
  return `<div class="stats-bar">${fastest}${power}${accel}${oldest}${pricey}</div>`;
}

function renderMonth(key){
  active=key;
  const m=CARS[key],feat=m.cars.find(c=>c.featured);
  const sorted=[...m.cars].sort((a,b)=>{
    const dt=(b.photoTimestamp||0)-(a.photoTimestamp||0);
    if(dt!==0) return dt;
    return (b.featured?1:0)-(a.featured?1:0);
  });
  document.getElementById('body').innerHTML=
    `<div class="month-hdr"><div class="month-title">${m.label}</div></div>`+
    (feat?`<div class="section-title">Destacado</div>`+featHero(feat):'')+
    (sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(m.cars):'')+
    (sorted.length?`<div class="section-title">Hallazgos</div><div class="cars-grid">${sorted.map(carCard).join('')}</div>`:
    `<div class="empty-msg"><i class="ti ti-car" aria-hidden="true"></i><p>Sin hallazgos este mes</p></div>`)+
    `<div class="add-box"><div class="add-lbl">Nuevo hallazgo</div>
    <button class="add-btn" onclick="sendPrompt('Quiero agregar un auto al dashboard. Aquí va la foto:')"><i class="ti ti-plus" aria-hidden="true"></i> AGREGAR AUTO</button>
    <div class="add-note">Sube la foto directamente al chat y Claude detecta la fecha y el modelo</div></div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m===key));
}

function renderTabs(){
  const SPECIAL=['nuestros-autos'];
  const months = Object.entries(CARS)
    .filter(([k])=>!SPECIAL.includes(k))
    .map(([k,v])=>({key:k,label:v.label,count:v.cars.length,type:'month',ts:parseInt(k.replace('-',''))||0}));
  const events = Object.entries(EVENTS).map(([k,v])=>({
    key:k,label:v.label,count:v.cars.length,type:'event',ts:v.timestamp
  }));
  const special = SPECIAL.filter(k=>CARS[k]).map(k=>({
    key:k,label:CARS[k].label,count:CARS[k].cars.length,type:'special',ts:-1
  }));
  const all=[...months,...events].sort((a,b)=>b.ts-a.ts);
  const allWithSpecial=[...all,...special];
  document.getElementById('tabs').innerHTML=allWithSpecial.map(t=>{
    if(t.type==='event')
      return `<div class="hw-tab hw-tab-event${t.key===active?' active':''}" data-m="${t.key}" onclick="setActive('${t.key}','event')">⚑ ${t.label}<span class="count-pill">${t.count}</span></div>`;
    if(t.type==='special')
      return `<div class="hw-tab hw-tab-special${t.key===active?' active':''}" data-m="${t.key}" onclick="setActive('${t.key}','month')">🚗 ${t.label}<span class="count-pill">${t.count}</span></div>`;
    return `<div class="hw-tab${t.key===active?' active':''}" data-m="${t.key}" onclick="setActive('${t.key}','month')">${t.label}<span class="count-pill">${t.count}</span></div>`;
  }).join('');
}

function setActive(key, type){
  active = key;
  if(type==='event') renderEvent(key);
  else renderMonth(key);
}

function renderEvent(key){
  active=key;
  const ev=EVENTS[key];
  const sorted=[...ev.cars].sort((a,b)=>{
    const dt=(b.photoTimestamp||0)-(a.photoTimestamp||0);
    if(dt!==0) return dt;
    return (b.featured?1:0)-(a.featured?1:0);
  });
  const feat=sorted[0];
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div class="event-trophy">⭐ Evento Especial</div>
      <div class="month-title">${ev.label}</div>
      <div class="event-meta" style="margin-top:.3rem;">
        <span class="event-meta-item">📅 ${ev.date}</span>
        <span class="event-meta-item">📍 ${ev.location}</span>
        <span class="event-meta-item">🚗 ${ev.cars.length} hallazgo${ev.cars.length!==1?'s':''}</span>
      </div>
      <div class="event-desc">${ev.description}</div>
    </div>`+
    (feat?`<div class="section-title">Destacado</div>`+featHero(feat):'')+
    (sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(ev.cars):'')+
    (sorted.length?`<div class="section-title">Hallazgos</div><div class="cars-grid">${sorted.map(carCard).join('')}</div>`:
    `<div class="empty-msg"><i class="ti ti-car" aria-hidden="true"></i><p>Sin hallazgos en este evento</p></div>`)+
    `<div class="add-box"><div class="add-lbl">Agregar auto de este evento</div>
    <button class="add-btn" onclick="sendPrompt('Quiero agregar un auto al evento ${ev.label}. Aquí va la foto:')"><i class="ti ti-plus" aria-hidden="true"></i> AGREGAR AUTO</button>
    <div class="add-note">Sube la foto directamente al chat y Claude detecta el modelo</div></div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m===key));
}

function renderCollectors(){
  document.getElementById('collGrid').innerHTML=COLLECTORS.map(c=>`
    <div class="coll-card">
      <div class="coll-photo"><div class="coll-initials">${c.initials}</div></div>
      <div class="coll-stripe"></div>
      <div class="coll-name">${c.name}</div>
      ${c.bio?`<div class="coll-bio">${c.bio}</div>`:`<div class="coll-bio-ph">Perfil pendiente...</div>`}
    </div>`).join('');
}

function init(){
  renderTabs();
  renderMonth(active);
  renderCollectors();
}
</script>
