function openLB(imgKey,cap,date){
  const src=IMGS[imgKey]||'';
  if(!src) return;
  const lb=document.getElementById('lightbox');
  const img=document.getElementById('lbImg');
  document.getElementById('lbCap').textContent=cap;
  document.getElementById('lbDate').textContent=date?'Fotografiado el '+date:'';
  document.getElementById('lbExtLink').href=src;
  document.getElementById('lbTabLink').href=src;
  document.getElementById('lbErr').style.display='none';
  img.style.display='block';
  img.src='';
  img.onerror=function(){
    img.style.display='none';
    document.getElementById('lbErr').style.display='flex';
  };
  img.onload=function(){ img.style.display='block'; document.getElementById('lbErr').style.display='none'; };
  img.src=src;
  lb.classList.add('open');
}
function closeLB(){document.getElementById('lightbox').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape') closeLB();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

function topStats(cars){
  if(!cars||cars.length<2) return '';
  function best(arr,fn,fmt,icon,label){
    const w=arr.reduce((a,b)=>fn(a)>=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }
  function parseSpeed(s){return parseFloat(s)||0;}
  function parseZero(s){return parseFloat(s)||999;}
  function parseYear(c){return c.modelYear||parseInt((c.years||'').split('–')[0])||9999;}
  function parsePrice(s){
    const matches=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>parseInt(m[1].replace(/,/g,'')));
    return matches.length?Math.max(...matches):0;
  }
  const fastest = best(cars,c=>parseSpeed(c.topSpeed),c=>c.topSpeed,'🏎️','Mayor velocidad');
  const power   = best(cars,c=>c.hp||0,c=>`${c.hp} hp`,'⚡','Mayor potencia');
  const accel   = best(cars,c=>-parseZero(c.zero),c=>c.zero,'🚀','Mejor aceleración');
  const oldest  = best(cars,c=>-parseYear(c),c=>parseYear(c),'📅','Más antiguo');
  function maxPriceDisplay(s){
    const matches=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>m[1]);
    return matches.length?'$'+matches[matches.length-1]:'';
  }
  const pricey  = best(cars,c=>parsePrice(c.priceCAD),c=>maxPriceDisplay(c.priceCAD),'💰','Más costoso');
  return `<div class="stats-bar">${fastest}${power}${accel}${oldest}${pricey}</div>`;
}

    return (b.featured?1:0)-(a.featured?1:0);
  });
  document.getElementById('body').innerHTML=
    `<div class="month-hdr"><div class="month-title">${m.label}</div></div>`+
    (m.recap?`<div class="month-recap">${m.recap}</div>`:'')+
    (feat?`<div class="section-title">Destacado</div>`+featHero(feat):'')+

}

function findCarById(id){
  for(const m of Object.values(CARS)){
    const c=m.cars.find(c=>c.id===id);
    if(c) return c;
  }
  for(const ev of Object.values(EVENTS)){
    const c=ev.cars.find(c=>c.id===id);
    if(c) return c;
  }
  return null;
}

  const sorted=[...cars].sort((a,b)=>{
    const dt=(b.photoTimestamp||0)-(a.photoTimestamp||0);
    if(dt!==0) return dt;
    return (b.featured?1:0)-(a.featured?1:0);
  });
  const feat=col.featuredId?cars.find(c=>c.id===col.featuredId):sorted.find(c=>c.featured)||sorted[0];
  document.getElementById('body').innerHTML=
    `<div class="month-hdr"><div class="month-title">${col.label}</div></div>`+
    `<div class="event-desc" style="margin-bottom:1.2rem;">${col.description}</div>`+
    (feat?`<div class="section-title">Destacado</div>`+featHero(feat):'')+
    (sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(sorted):'')+
    (sorted.length?`<div class="section-title">Hallazgos</div><div class="cars-grid">${sorted.map(carCard).join('')}</div>`:
    `<div class="empty-msg"><i class="ti ti-car" aria-hidden="true"></i><p>Sin autos aún</p></div>`);
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m===key));
}

function renderTabs(){
  // Group months by year
  const monthEntries=Object.entries(CARS).filter(([k])=>k.match(/^\d{4}-\d{2}$/));
  const byYear={};
  monthEntries.forEach(([k,v])=>{
    const yr=k.split('-')[0];
    if(!byYear[yr]) byYear[yr]=[];
    byYear[yr].push({key:k,label:v.label,count:v.cars.length});
  });
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  const events=Object.entries(EVENTS).map(([k,v])=>({key:k,label:v.label,count:v.cars.length,ts:v.timestamp||0})).sort((a,b)=>b.ts-a.ts);
  const evActive=events.some(e=>e.key===active);

  let html='';
  html+=`<div class="hw-tab hw-tab-brands${'marcas'===active?' active':''}" data-m="marcas" onclick="setActive('marcas','brands')">🏁 Marcas</div>`;
  html+=`<div class="hw-tab hw-tab-event${evActive?' active':''} hw-tab-drop" data-m="__eventos" onclick="toggleDrop(this,'eventos')">⚑ Eventos <span class="drop-arrow">▾</span></div>`;
  const na=CARS['nuestros-autos'];
  html+=`<div class="hw-tab hw-tab-special${'nuestros-autos'===active?' active':''}" data-m="nuestros-autos" onclick="setActive('nuestros-autos','month');closeDrop()">🚗 Nuestros Autos<span class="count-pill">${na?na.cars.length:0}</span></div>`;
  years.forEach(yr=>{
    const months=byYear[yr].sort((a,b)=>b.key.localeCompare(a.key));
    const yrActive=months.some(m=>m.key===active);
    html+=`<div class="hw-tab${yrActive?' active':''} hw-tab-drop" data-m="__yr${yr}" onclick="toggleDrop(this,'yr${yr}')">${yr} <span class="drop-arrow">▾</span></div>`;
  });
  const ad=COLLECTIONS['autos-divertidos'];
  html+=`<div class="hw-tab hw-tab-fun${'autos-divertidos'===active?' active':''}" data-m="autos-divertidos" onclick="setActive('autos-divertidos','collection');closeDrop()">😄 Autos Divertidos<span class="count-pill">${ad?ad.carIds.length:0}</span></div>`;
  document.getElementById('tabs').innerHTML=html;
}

function buildDropItems(id, events, byYear){
  const eventsData=Object.entries(EVENTS).map(([k,v])=>({key:k,label:v.label,count:v.cars.length,ts:v.timestamp||0})).sort((a,b)=>b.ts-a.ts);
  if(id==='eventos'){
    return eventsData.map(e=>`<div class="drop-item${e.key===active?' drop-active':''}" onclick="setActive('${e.key}','event');closeDrop()">${e.label}<span class="drop-pill">${e.count}</span></div>`).join('');
  }
  const yr=id.replace('yr','');
  const monthEntries=Object.entries(CARS).filter(([k])=>k.startsWith(yr+'-'));
  const months=monthEntries.map(([k,v])=>({key:k,label:v.label,count:v.cars.length})).sort((a,b)=>b.key.localeCompare(a.key));
  return months.map(m=>`<div class="drop-item${m.key===active?' drop-active':''}" onclick="setActive('${m.key}','month');closeDrop()">${m.label}<span class="drop-pill">${m.count}</span></div>`).join('');
}

function toggleDrop(el, id){
  const ov=document.getElementById('drop-overlay');
  if(window._openDrop===id){ closeDrop(); return; }
  window._openDrop=id;
  const rect=el.getBoundingClientRect();
  const items=buildDropItems(id);
  ov.innerHTML=`<div class="drop-menu open">${items}</div>`;
  ov.style.display='block';
  ov.style.left=Math.min(rect.left, window.innerWidth-220)+'px';
  ov.style.top=(rect.bottom+4)+'px';
  ov.style.minWidth='200px';
}

function closeDrop(){
  window._openDrop=null;
  const ov=document.getElementById('drop-overlay');
  if(ov){ ov.style.display='none'; ov.innerHTML=''; }
}

// Close dropdown when clicking outside
document.addEventListener('click',function(e){
  if(window._openDrop && !e.target.closest('.hw-tab-drop') && !e.target.closest('#drop-overlay')){
    closeDrop();
  }
});

const navHistory=[];
function setActive(key, type, pushHistory=true){
  if(pushHistory && active) navHistory.push({key:active, type:window._activeType||'month'});
  window._activeType=type;
  active = key;
  if(type==='event') renderEvent(key);
  else if(type==='collection') renderCollection(key);
  else if(type==='brands') renderBrands();
  else if(type==='brand-detail') renderBrandDetail(key);
  else renderMonth(key);
  updateBackBtn();
}

function goBack(){
  if(!navHistory.length) return;
  const prev=navHistory.pop();
  setActive(prev.key, prev.type, false);
}

function updateBackBtn(){
  const btn=document.getElementById('back-btn');
  if(!btn) return;
  btn.style.display=navHistory.length?'flex':'none';
}

function getAllCars(){
  const all=[];
  Object.entries(CARS).forEach(([,sec])=>sec.cars.forEach(c=>all.push(c)));
  Object.entries(EVENTS).forEach(([,ev])=>ev.cars.forEach(c=>all.push(c)));
  return all;
}

function renderBrands(){
  active='marcas';
  const all=getAllCars();
  const byMake={};
  all.forEach(c=>{
    if(!byMake[c.make]) byMake[c.make]=[];
    byMake[c.make].push(c);
  });
  const sorted=Object.keys(byMake).sort((a,b)=>a.localeCompare(b));
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div class="month-title">Marcas</div>
      <div class="month-recap">Todas las marcas del dashboard — haz clic en una para ver sus autos.</div>
    </div>
    <div class="brands-grid">
      ${sorted.map(make=>{
        const cars=byMake[make];
        const logoKey=BRAND_LOGOS[make];
        const logoSrc=logoKey&&IMGS[logoKey];
        const logoHtml=logoSrc
          ?`<img src="${logoSrc}" alt="${make}" class="brand-card-logo" />`
          :`<div class="brand-card-initials">${make.substring(0,2).toUpperCase()}</div>`;
        return `<div class="brand-card" onclick="setActive('brand::${make}','brand-detail')">
          <div class="brand-card-img">${logoHtml}</div>
          <div class="brand-card-name">${make}</div>
          <div class="brand-card-count">${cars.length} auto${cars.length!==1?'s':''}</div>
        </div>`;
      }).join('')}
    </div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m==='marcas'));
}

function renderBrandDetail(makeKey){
  const make=makeKey.replace('brand::','');
  const all=getAllCars().filter(c=>c.make===make);
  const sorted=[...all].sort((a,b)=>(b.photoTimestamp||0)-(a.photoTimestamp||0));
  const logoKey=BRAND_LOGOS[make];
  const logoSrc=logoKey&&IMGS[logoKey];
  const logoHtml=logoSrc?`<img src="${logoSrc}" alt="${make}" style="height:48px;object-fit:contain;" />`:`<strong>${make}</strong>`;
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        ${logoHtml}
        <div>
          <div class="month-title">${make}</div>
          <div class="month-recap">${sorted.length} auto${sorted.length!==1?'s':''} en el dashboard · <span style="cursor:pointer;color:#c8a200;text-decoration:underline;" onclick="renderBrands()">← Todas las marcas</span></div>
        </div>
      </div>
    </div>
    ${sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(sorted):''}
    <div class="section-title">Autos</div>
    <div class="cars-grid">${sorted.map(carCard).join('')}</div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m==='marcas'));
}

function renderEvent(key){
  active=key;
  const ev=EVENTS[key];
  const sorted=[...ev.cars].sort((a,b)=>{
    const dt=(b.photoTimestamp||0)-(a.photoTimestamp||0);
    if(dt!==0) return dt;
    return (b.featured?1:0)-(a.featured?1:0);
  });
  const feat=sorted[0];
  document.getElementById('body').innerHTML=
    `<div class="month-hdr">
      <div class="event-trophy">⭐ Evento Especial</div>
      <div class="month-title">${ev.label}</div>
      <div class="event-meta" style="margin-top:.3rem;">
        <span class="event-meta-item">📅 ${ev.date}</span>
        <span class="event-meta-item">📍 ${ev.location}</span>
        <span class="event-meta-item">🚗 ${ev.cars.length} hallazgo${ev.cars.length!==1?'s':''}</span>
      </div>
      <div class="event-desc">${ev.description}</div>
    </div>`+
    (feat?`<div class="section-title">Destacado</div>`+featHero(feat):'')+
    (sorted.length>=2?`<div class="section-title">Top Estadísticas</div>`+topStats(ev.cars):'')+
    (sorted.length?`<div class="section-title">Hallazgos</div><div class="cars-grid">${sorted.map(carCard).join('')}</div>`:
    `<div class="empty-msg"><i class="ti ti-car" aria-hidden="true"></i><p>Sin hallazgos en este evento</p></div>`)+
    `<div class="add-box"><div class="add-lbl">Agregar auto de este evento</div>
    <button class="add-btn" onclick="sendPrompt('Quiero agregar un auto al evento ${ev.label}. Aquí va la foto:')"><i class="ti ti-plus" aria-hidden="true"></i> AGREGAR AUTO</button>
    <div class="add-note">Sube la foto directamente al chat y Claude detecta el modelo</div></div>`;
  document.querySelectorAll('.hw-tab').forEach(t=>t.classList.toggle('active',t.dataset.m===key));
}

function renderCollectors(){
  document.getElementById('collGrid').innerHTML=COLLECTORS.map(c=>`
    <div class="coll-card">
      <div class="coll-photo"><div class="coll-initials">${c.initials}</div></div>
      <div class="coll-stripe"></div>
      <div class="coll-name">${c.name}</div>
      ${c.bio?`<div class="coll-bio">${c.bio}</div>`:`<div class="coll-bio-ph">Perfil pendiente...</div>`}
    </div>`).join('');
}

function renderGlobalTopStats(){
  // Collect all cars from all sections
  const allCars = [];
  Object.values(CARS).forEach(m=>m.cars.forEach(c=>allCars.push(c)));
  Object.values(EVENTS).forEach(e=>e.cars.forEach(c=>allCars.push(c)));

  function parseSpeed(s){return parseFloat((s||'').replace(',','.'))||0;}
  function parseZero(s){const v=parseFloat(s);return(!s||s==='N/A'||isNaN(v))?999:v;}
  function parseYear(c){return parseInt((c.years||'').split(/[–-]/)[0])||9999;}
  function parsePrice(s){
    const m=[...(s||'').matchAll(/\$([\d,]+)/g)].map(m=>parseInt(m[1].replace(/,/g,'')));
    return m.length?Math.max(...m):0;
  }
  function maxPriceLabel(s){
    const m=[...(s||'').matchAll(/\$([\d,]+)/g)];
    return m.length?'$'+m[m.length-1][1]:'N/A';
  }

  function best(fn,fmt,icon,label){
    const valid=allCars.filter(c=>fn(c)>0);
    if(!valid.length) return '';
    const w=valid.reduce((a,b)=>fn(a)>=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }
  function bestMin(fn,fmt,icon,label){
    const valid=allCars.filter(c=>fn(c)<9999);
    if(!valid.length) return '';
    const w=valid.reduce((a,b)=>fn(a)<=fn(b)?a:b);
    return `<div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-value">${fmt(w)}</div>
      <div class="stat-car">${w.make} ${w.model}</div>
    </div>`;
  }

  const power   = best(c=>c.hp||0, c=>`${c.hp} hp`, '⚡', 'Mayor potencia');
  const fastest = best(c=>parseSpeed(c.topSpeed), c=>c.topSpeed, '🏎️', 'Mayor velocidad');
  const accel   = bestMin(c=>parseZero(c.zero), c=>c.zero, '🚀', 'Mejor aceleración');
  const oldest  = bestMin(c=>parseYear(c), c=>String(parseYear(c)), '📅', 'Más antiguo');
  const pricey  = best(c=>parsePrice(c.priceCAD), c=>maxPriceLabel(c.priceCAD), '💰', 'Más costoso');

  const total = allCars.length;

  document.getElementById('global-top-stats').innerHTML = `
    <div style="padding:.6rem 1rem .2rem;background:#fff;border-bottom:1px solid #eee;">
      <div style="font-size:.65rem;font-weight:800;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;">🏆 Récords de la Colección · ${total} vehículos</div>
      <div class="stats-bar" style="margin:0;">${power}${fastest}${accel}${oldest}${pricey}</div>
    </div>`;
}

function init(){
  renderTabs();
  renderMonth(active);
  renderCollectors();
  renderGlobalTopStats();
  enableTabsScroll();
}

function enableTabsScroll(){
  const tabs=document.getElementById('tabs');
  if(!tabs) return;
  tabs.addEventListener('wheel',e=>{
    if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){
      tabs.scrollLeft+=e.deltaY;
      e.preventDefault();
    }
  },{passive:false});
  let isDown=false,startX=0,startScroll=0,moved=false;
  tabs.addEventListener('mousedown',e=>{
    isDown=true;moved=false;tabs.classList.add('dragging');
    startX=e.pageX;startScroll=tabs.scrollLeft;
  });
  window.addEventListener('mouseup',()=>{isDown=false;tabs.classList.remove('dragging');});
  tabs.addEventListener('mouseleave',()=>{isDown=false;tabs.classList.remove('dragging');});
  tabs.addEventListener('mousemove',e=>{
    if(!isDown) return;
    e.preventDefault();
    const dx=e.pageX-startX;
    if(Math.abs(dx)>3) moved=true;
    tabs.scrollLeft=startScroll-dx;
  });
  tabs.addEventListener('click',e=>{ if(moved){ e.preventDefault(); e.stopPropagation(); } },{capture:true});
}
</script>
